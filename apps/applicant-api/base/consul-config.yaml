apiVersion: v1
kind: ConfigMap
metadata:
  name: applicant-api-consul-config
  labels:
    app.kubernetes.io/name: applicant-api
    app.kubernetes.io/part-of: lendora
data:
  applicant-api.yml: |
    spark:
      applicant:
        auth:
          runtime-store: redis-jdbc
          otp-provider: test
          token-mode: hmac
          migrations-enabled: false
          consul:
            enabled: true
            service-name: applicant-api
            health-check-path: /ready
    otel:
      traces:
        exporter: otlp
        sampler: parentbased_traceidratio
        sampler.arg: 0.1
      exporter:
        otlp:
          traces:
            protocol: http/protobuf
---
apiVersion: batch/v1
kind: Job
metadata:
  name: applicant-api-consul-config
  labels:
    app.kubernetes.io/name: applicant-api
    app.kubernetes.io/part-of: lendora
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: applicant-api-consul-config
        app.kubernetes.io/part-of: lendora
    spec:
      restartPolicy: OnFailure
      containers:
        - name: consul-config
          image: curlimages/curl:8.11.1
          command:
            - sh
            - -ceu
            - |
              curl --fail --request PUT --data-binary @/config/applicant-api.yml \
                http://consul.lendora-sta-consul.svc.cluster.local:8500/v1/kv/config/applicant-api/data
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: applicant-api-consul-config
