apiVersion: v1
kind: ConfigMap
metadata:
  name: applicant-api-config
  labels:
    app.kubernetes.io/name: applicant-api
    app.kubernetes.io/part-of: lendora
data:
  SPRING_PROFILES_ACTIVE: sta-1
  SERVER_PORT: "8080"
  SPARK_GRPC_SERVER_PORT: "9090"
  SPARK_APPLICANT_AUTH_JDBC_URL: jdbc:postgresql://postgres.lendora-shared-postgres.svc.cluster.local:5432/sta_1_applicant
  SPARK_APPLICANT_AUTH_JDBC_USERNAME: sta_1_applicant
  SPARK_APPLICANT_AUTH_MIGRATIONS_ENABLED: "false"
  SPRING_DATA_REDIS_HOST: redis.lendora-shared-redis.svc.cluster.local
  SPRING_DATA_REDIS_PORT: "6379"
  SPARK_APPLICANT_AUTH_CONSUL_ENABLED: "true"
  SPARK_APPLICANT_AUTH_CONSUL_URL: http://consul.lendora-shared-consul.svc.cluster.local:8500
  SPARK_APPLICANT_AUTH_CONSUL_SERVICE_NAME: sta-1-applicant-api
  SPARK_APPLICANT_AUTH_CONSUL_SERVICE_ADDRESS: applicant-api.lendora-sta-1.svc.cluster.local
  SPARK_APPLICANT_AUTH_CONSUL_HEALTH_CHECK_URL: http://applicant-api.lendora-sta-1.svc.cluster.local:80/ready
  OTEL_TRACES_EXPORTER: otlp
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ""
