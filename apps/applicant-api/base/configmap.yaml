apiVersion: v1
kind: ConfigMap
metadata:
  name: applicant-api-config
  labels:
    app.kubernetes.io/name: applicant-api
    app.kubernetes.io/part-of: lendora
data:
  SPRING_PROFILES_ACTIVE: sta
  SERVER_PORT: "8080"
  SPARK_GRPC_SERVER_PORT: "9090"
  SPARK_APPLICANT_AUTH_JDBC_URL: jdbc:postgresql://postgres.lendora-sta-postgres.svc.cluster.local:5432/applicant
  SPARK_APPLICANT_AUTH_JDBC_USERNAME: applicant
  SPARK_APPLICANT_AUTH_MIGRATIONS_ENABLED: "false"
  SPRING_DATA_REDIS_HOST: redis.lendora-sta-redis.svc.cluster.local
  SPRING_DATA_REDIS_PORT: "6379"
  SPARK_APPLICANT_AUTH_CONSUL_ENABLED: "true"
  SPARK_APPLICANT_AUTH_CONSUL_URL: http://consul.lendora-sta-consul.svc.cluster.local:8500
  SPARK_APPLICANT_AUTH_CONSUL_SERVICE_ADDRESS: applicant-api.lendora-sta-applicant-api.svc.cluster.local
  SPARK_APPLICANT_AUTH_CONSUL_HEALTH_CHECK_URL: http://applicant-api.lendora-sta-applicant-api.svc.cluster.local:80/ready
  OTEL_TRACES_EXPORTER: otlp
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector.lendora-sta-observability.svc.cluster.local:4318/v1/traces
