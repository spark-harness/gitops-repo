apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: lendora-dev-1
resources:
- ../../base
images:
- name: ghcr.io/spark-harness/applicant-api
  digest: sha256:1ed5ad7dfce767e4cca36b30954c01a0b142f18bb2cfe7fe63493b43a25d8cf0
replicas:
- name: applicant-api
  count: 1
labels:
- pairs:
    lendora.io/environment: dev-1
patches:
- target:
    kind: ConfigMap
    name: applicant-api-config
  patch: "- op: replace\n  path: /data/SPRING_PROFILES_ACTIVE\n  value: dev-1\n- op:\
    \ replace\n  path: /data/SPARK_APPLICANT_AUTH_JDBC_URL\n  value: jdbc:postgresql://postgres.lendora-shared-postgres.svc.cluster.local:5432/dev_1_applicant\n\
    - op: replace\n  path: /data/SPARK_APPLICANT_AUTH_JDBC_USERNAME\n  value: dev_1_applicant\n\
    - op: replace\n  path: /data/SPRING_DATA_REDIS_HOST\n  value: redis.lendora-shared-redis.svc.cluster.local\n\
    - op: add\n  path: /data/SPRING_DATA_REDIS_DATABASE\n  value: \"1\"\n- op: replace\n\
    \  path: /data/SPARK_APPLICANT_AUTH_CONSUL_URL\n  value: http://consul.lendora-shared-consul.svc.cluster.local:8500\n\
    - op: add\n  path: /data/SPARK_APPLICANT_AUTH_CONSUL_SERVICE_NAME\n  value: dev-1-applicant-api\n\
    - op: replace\n  path: /data/SPARK_APPLICANT_AUTH_CONSUL_SERVICE_ADDRESS\n  value:\
    \ applicant-api.lendora-dev-1.svc.cluster.local\n- op: replace\n  path: /data/SPARK_APPLICANT_AUTH_CONSUL_HEALTH_CHECK_URL\n\
    \  value: http://applicant-api.lendora-dev-1.svc.cluster.local:80/ready"
- target:
    kind: ConfigMap
    name: applicant-api-consul-config
  patch: "- op: replace\n  path: /data/applicant-api.yml\n  value: |\n    spark:\n\
    \      applicant:\n        auth:\n          runtime-store: redis-jdbc\n      \
    \    otp-provider: test\n          token-mode: hmac\n          migrations-enabled:\
    \ false\n          jdbc-url: jdbc:postgresql://postgres.lendora-shared-postgres.svc.cluster.local:5432/dev_1_applicant\n\
    \          jdbc-username: dev_1_applicant\n          consul:\n            enabled:\
    \ true\n            service-name: dev-1-applicant-api\n            health-check-path:\
    \ /ready\n    spring:\n      data:\n        redis:\n          host: redis.lendora-shared-redis.svc.cluster.local\n\
    \          database: 1\n    otel:\n      traces:\n        exporter: otlp\n   \
    \     sampler: parentbased_traceidratio\n        sampler.arg: 0.1\n      exporter:\n\
    \        otlp:\n          traces:\n            protocol: http/protobuf"
- target:
    kind: Job
    name: applicant-api-consul-config
  patch: "- op: replace\n  path: /spec/template/spec/containers/0/command/2\n  value:\
    \ |\n    curl --fail --request PUT --data-binary @/config/applicant-api.yml \\\
    \n      http://consul.lendora-shared-consul.svc.cluster.local:8500/v1/kv/spark/lendora/dev-1/applicant-api/config"
- target:
    kind: NetworkPolicy
    name: applicant-api-ingress
  patch: "- op: replace\n  path: /spec/ingress\n  value:\n    - from:\n        - namespaceSelector:\n\
    \            matchLabels:\n              kubernetes.io/metadata.name: lendora-dev-1\n\
    \      ports:\n        - protocol: TCP\n          port: 9090\n        - protocol:\
    \ TCP\n          port: 8080\n        - protocol: TCP\n          port: 80\n   \
    \ - from:\n        - namespaceSelector:\n            matchLabels:\n          \
    \    kubernetes.io/metadata.name: lendora-shared-consul\n      ports:\n      \
    \  - protocol: TCP\n          port: 8080"
