apiVersion: v1
kind: ConfigMap
metadata:
  name: quote-api-consul-config
  labels:
    app.kubernetes.io/name: quote-api
    app.kubernetes.io/part-of: lendora
data:
  quote-api.yml: |
    spark:
      quote:
        validity: 30m
        consul:
          enabled: true
          service-name: sta-1-quote-api
          service-address: quote-api.lendora-sta-1.svc.cluster.local
          http-port: 80
          health-check-url: http://quote-api.lendora-sta-1.svc.cluster.local:80/ready
    otel:
      service:
        name: quote-api
      traces:
        exporter: otlp
        sampler: parentbased_traceidratio
        sampler.arg: 0.1
      exporter:
        otlp:
          traces:
            protocol: http/protobuf
---
apiVersion: batch/v1
kind: Job
metadata:
  name: quote-api-consul-config
  labels:
    app.kubernetes.io/name: quote-api
    app.kubernetes.io/part-of: lendora
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: quote-api-consul-config
        app.kubernetes.io/part-of: lendora
    spec:
      restartPolicy: OnFailure
      containers:
        - name: consul-config
          image: curlimages/curl:8.11.1
          command:
            - sh
            - -ceu
            - |
              key_url="http://consul.lendora-shared-consul.svc.cluster.local:8500/v1/kv/spark/lendora/sta-1/quote-api/config"
              existing="$(curl --fail --silent "${key_url}?raw" || true)"
              endpoint="$(printf '%s\n' "$existing" | sed -n 's/^[[:space:]]*endpoint:[[:space:]]*//p' | tail -n 1)"
              headers="$(printf '%s\n' "$existing" | sed -n 's/^[[:space:]]*headers:[[:space:]]*//p' | tail -n 1)"
              cp /config/quote-api.yml /tmp/quote-api.yml
              if [ -n "$endpoint" ]; then
                printf '            endpoint: %s\n' "$endpoint" >> /tmp/quote-api.yml
              fi
              if [ -n "$headers" ]; then
                printf '            headers: %s\n' "$headers" >> /tmp/quote-api.yml
              fi
              curl --fail --request PUT --data-binary @/tmp/quote-api.yml "$key_url"
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: quote-api-consul-config
