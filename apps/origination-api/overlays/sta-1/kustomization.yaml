apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: lendora-sta-1
resources:
  - ../../base
images:
  - name: ghcr.io/spark-harness/origination-api
    digest: sha256:94ea8d38c46341db044ede4ef6586e7cef96a2745d28fef2f114b5dd3d35880a
replicas:
  - name: origination-api
    count: 1
labels:
  - pairs:
      lendora.io/environment: sta-1
patches:
  - target:
      kind: ConfigMap
      name: origination-api-config
    patch: |-
      - op: replace
        path: /data/SPRING_PROFILES_ACTIVE
        value: sta-1
      - op: replace
        path: /data/ORIGINATION_JDBC_URL
        value: jdbc:postgresql://postgres.lendora-shared-postgres.svc.cluster.local:5432/sta_1_origination
      - op: replace
        path: /data/ORIGINATION_JDBC_USERNAME
        value: sta_1_origination
      - op: replace
        path: /data/ORIGINATION_QUOTE_API_BASE_URL
        value: http://quote-api.lendora-sta-1.svc.cluster.local
      - op: replace
        path: /data/SPARK_ORIGINATION_CONSUL_URL
        value: http://consul.lendora-shared-consul.svc.cluster.local:8500
      - op: replace
        path: /data/SPARK_ORIGINATION_CONSUL_SERVICE_NAME
        value: sta-1-origination-api
      - op: replace
        path: /data/SPARK_ORIGINATION_CONSUL_SERVICE_ADDRESS
        value: origination-api.lendora-sta-1.svc.cluster.local
      - op: replace
        path: /data/SPARK_ORIGINATION_CONSUL_HEALTH_CHECK_URL
        value: http://origination-api.lendora-sta-1.svc.cluster.local:80/ready
  - target:
      kind: ConfigMap
      name: origination-api-consul-config
    patch: |-
      - op: replace
        path: /data/origination-api.yml
        value: |
          spark:
            origination:
              quote-api-base-url: http://quote-api.lendora-sta-1.svc.cluster.local
              quote-api-timeout: 3s
              consul:
                enabled: true
                service-name: sta-1-origination-api
                service-address: origination-api.lendora-sta-1.svc.cluster.local
                http-port: 80
                health-check-url: http://origination-api.lendora-sta-1.svc.cluster.local:80/ready
          otel:
            service:
              name: origination-api
            traces:
              exporter: otlp
              sampler: parentbased_traceidratio
              sampler.arg: 0.1
            exporter:
              otlp:
                traces:
                  protocol: http/protobuf
  - target:
      kind: Job
      name: origination-api-consul-config
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/command/2
        value: |
          key_url="http://consul.lendora-shared-consul.svc.cluster.local:8500/v1/kv/spark/lendora/sta-1/origination-api/config"
          existing="$(curl --fail --silent "${key_url}?raw" || true)"
          endpoint="$(printf '%s\n' "$existing" | sed -n 's/^[[:space:]]*endpoint:[[:space:]]*//p' | tail -n 1)"
          headers="$(printf '%s\n' "$existing" | sed -n 's/^[[:space:]]*headers:[[:space:]]*//p' | tail -n 1)"
          cp /config/origination-api.yml /tmp/origination-api.yml
          if [ -n "$endpoint" ]; then
            printf '            endpoint: %s\n' "$endpoint" >> /tmp/origination-api.yml
          fi
          if [ -n "$headers" ]; then
            printf '            headers: %s\n' "$headers" >> /tmp/origination-api.yml
          fi
          curl --fail --request PUT --data-binary @/tmp/origination-api.yml "$key_url"
  - target:
      kind: NetworkPolicy
      name: origination-api-ingress
    patch: |-
      - op: replace
        path: /spec/ingress
        value:
          - from:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: lendora-sta-1
            ports:
              - protocol: TCP
                port: 8080
              - protocol: TCP
                port: 80
          - from:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: lendora-shared-consul
            ports:
              - protocol: TCP
                port: 8080
