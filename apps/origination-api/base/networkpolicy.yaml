apiVersion: v1
kind: ServiceAccount
metadata:
  name: origination-api
  labels:
    app.kubernetes.io/name: origination-api
    app.kubernetes.io/part-of: lendora
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: origination-api-ingress
  labels:
    app.kubernetes.io/name: origination-api
    app.kubernetes.io/part-of: lendora
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: origination-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              lendora.io/origination-api-client: "true"
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 80
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: lendora-sta-consul
      ports:
        - protocol: TCP
          port: 8080
