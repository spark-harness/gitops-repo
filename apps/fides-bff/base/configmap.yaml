apiVersion: v1
kind: ConfigMap
metadata:
  name: fides-bff-config
  labels:
    app.kubernetes.io/name: fides-bff
    app.kubernetes.io/part-of: lendora
data:
  config.yaml: |
    server:
      http:
        network: tcp
        addr: 0.0.0.0:8000
      cors:
        allowed_origins:
          - https://sta-1-fides.fuzzytails.fun
    applicant:
      consul:
        address: consul.lendora-shared-consul.svc.cluster.local:8500
        scheme: http
        service_name: sta-1-applicant-api
      grpc:
        timeout: 3s
        plaintext: true
    quote:
      consul:
        address: consul.lendora-shared-consul.svc.cluster.local:8500
        scheme: http
        service_name: sta-1-quote-api
      http:
        base_url: ""
        timeout: 3s
    origination:
      consul:
        address: consul.lendora-shared-consul.svc.cluster.local:8500
        scheme: http
        service_name: sta-1-origination-api
      http:
        base_url: ""
        timeout: 3s
    auth:
      token_mode: hmac
      access_token_ttl: 1h
    registry:
      consul:
        enabled: true
        address: consul.lendora-shared-consul.svc.cluster.local:8500
        scheme: http
        service_name: sta-1-fides-bff
        discovery_addr: fides-bff.lendora-sta-1.svc.cluster.local:8000
        heartbeat: true
        health_check: true
        health_check_interval_sec: 10
        deregister_after_sec: 60
        metadata:
          module: frontend
          environment: sta-1
    observability:
      otel:
        enabled: false
        exporter: otlp
        endpoint: ""
        protocol: http/protobuf
        headers: {}
        environment: sta-1
        release: runtime
