apiVersion: v1
kind: Service
metadata:
  name: consul
  labels:
    app.kubernetes.io/name: consul
    app.kubernetes.io/part-of: lendora
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: consul
  ports:
    - name: http
      port: 8500
      targetPort: http
    - name: dns
      port: 8600
      protocol: UDP
      targetPort: dns
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: consul
  labels:
    app.kubernetes.io/name: consul
    app.kubernetes.io/part-of: lendora
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: consul
  template:
    metadata:
      labels:
        app.kubernetes.io/name: consul
        app.kubernetes.io/part-of: lendora
    spec:
      containers:
        - name: consul
          image: hashicorp/consul:1.20
          args:
            - agent
            - -server
            - -bootstrap-expect=1
            - -client=0.0.0.0
            - -ui
            - -data-dir=/consul/data
          ports:
            - name: http
              containerPort: 8500
            - name: dns
              containerPort: 8600
              protocol: UDP
          readinessProbe:
            httpGet:
              path: /v1/status/leader
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/status/leader
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /consul/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: consul-data
