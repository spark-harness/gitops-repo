apiVersion: batch/v1
kind: Job
metadata:
  name: origination-postgres-init
  labels:
    app.kubernetes.io/name: origination-postgres-init
    app.kubernetes.io/part-of: lendora
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: origination-postgres-init
        app.kubernetes.io/part-of: lendora
    spec:
      restartPolicy: OnFailure
      containers:
        - name: origination-postgres-init
          image: postgres:16.6
          env:
            - name: PGHOST
              value: postgres.lendora-shared-postgres.svc.cluster.local
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: postgres-auth
                  key: POSTGRES_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-auth
                  key: POSTGRES_PASSWORD
            - name: ORIGINATION_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: origination-api-runtime
                  key: db-password
          command:
            - sh
            - -ceu
            - |
              psql -d postgres -v ON_ERROR_STOP=1 -v origination_password="${ORIGINATION_DB_PASSWORD}" <<SQL
              SELECT format('CREATE ROLE dev_1_origination LOGIN PASSWORD %L', :'origination_password')
              WHERE NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'dev_1_origination')\gexec
              SELECT 'CREATE DATABASE dev_1_origination OWNER dev_1_origination'
              WHERE NOT EXISTS (SELECT 1 FROM pg_database WHERE datname = 'dev_1_origination')\gexec
              SELECT format('CREATE ROLE sta_1_origination LOGIN PASSWORD %L', :'origination_password')
              WHERE NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'sta_1_origination')\gexec
              SELECT 'CREATE DATABASE sta_1_origination OWNER sta_1_origination'
              WHERE NOT EXISTS (SELECT 1 FROM pg_database WHERE datname = 'sta_1_origination')\gexec
              SQL
