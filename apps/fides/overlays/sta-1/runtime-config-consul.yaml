apiVersion: v1
kind: ConfigMap
metadata:
  name: fides-web-runtime-config
  labels:
    app.kubernetes.io/name: fides
    app.kubernetes.io/part-of: lendora
data:
  runtime-config.json: |
    {
      "otpAdapter": "real",
      "bffBaseUrl": "https://sta-1-api.fuzzytails.fun/api/v1",
      "browserTracing": {
        "headers": {}
      }
    }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: fides-web-runtime-config
  labels:
    app.kubernetes.io/name: fides
    app.kubernetes.io/part-of: lendora
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fides-web-runtime-config
        app.kubernetes.io/part-of: lendora
    spec:
      restartPolicy: OnFailure
      containers:
        - name: consul-config
          image: curlimages/curl:8.11.1
          command:
            - sh
            - -ceu
            - |
              curl --fail --request PUT --data-binary @/config/runtime-config.json \
                http://consul.lendora-shared-consul.svc.cluster.local:8500/v1/kv/spark/lendora/sta-1/fides-web/runtime-config
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: fides-web-runtime-config
