apiVersion: apps/v1
kind: Deployment
metadata:
  name: fides
  labels:
    app.kubernetes.io/name: fides
    app.kubernetes.io/part-of: lendora
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fides
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fides
        app.kubernetes.io/part-of: lendora
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: fides
          image: ghcr.io/spark-harness/fides:replace-me
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: FIDES_RUNTIME_ENV
              value: sta-1
            - name: FIDES_RUNTIME_CONFIG_CONSUL_URL
              value: http://consul.lendora-shared-consul.svc.cluster.local:8500
            - name: FIDES_RUNTIME_CONFIG_CONSUL_KEY
              value: spark/lendora/sta-1/fides-web/runtime-config
            - name: FIDES_OTP_ADAPTER
              value: real
            - name: FIDES_BFF_BASE_URL
              value: https://sta-1-api.fuzzytails.fun/api/v1
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
