apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: applicant-api-sta1
  namespace: argocd
spec:
  project: spark-sta1
  source:
    repoURL: https://github.com/spark-harness/gitops-repo.git
    targetRevision: main
    path: apps/applicant-api/overlays/sta1
  destination:
    server: https://kubernetes.default.svc
    namespace: spark-sta1
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
