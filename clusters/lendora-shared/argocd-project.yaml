apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: lendora-shared
  namespace: argocd
spec:
  description: Lendora shared infrastructure for dev-1 and sta-1.
  sourceRepos:
    - https://github.com/spark-harness/gitops-repo.git
  destinations:
    - namespace: lendora-shared-postgres
      server: https://kubernetes.default.svc
    - namespace: lendora-shared-redis
      server: https://kubernetes.default.svc
    - namespace: lendora-shared-consul
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
