apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lendora-shared-dependencies
  namespace: argocd
spec:
  project: lendora-shared
  source:
    repoURL: https://github.com/spark-harness/gitops-repo.git
    targetRevision: master
    path: apps/lendora-shared-dependencies/overlays/shared
  destination:
    server: https://kubernetes.default.svc
    namespace: lendora-shared-postgres
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
