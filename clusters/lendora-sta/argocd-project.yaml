apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: lendora-sta
  namespace: argocd
spec:
  description: Lendora STA runtime environment.
  sourceRepos:
    - https://github.com/spark-harness/gitops-repo.git
  destinations:
    - namespace: lendora-sta-postgres
      server: https://kubernetes.default.svc
    - namespace: lendora-sta-redis
      server: https://kubernetes.default.svc
    - namespace: lendora-sta-consul
      server: https://kubernetes.default.svc
    - namespace: lendora-sta-applicant-api
      server: https://kubernetes.default.svc
    - namespace: lendora-sta-quote-api
      server: https://kubernetes.default.svc
    - namespace: lendora-sta-origination-api
      server: https://kubernetes.default.svc
    - namespace: lendora-sta-fides-bff
      server: https://kubernetes.default.svc
    - namespace: lendora-sta-fides
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
