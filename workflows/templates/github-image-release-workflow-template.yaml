apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: github-image-release
  namespace: argo
spec:
  entrypoint: run
  serviceAccountName: argo
  onExit: report-failure
  volumeClaimTemplates:
    - metadata:
        name: workspace
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 8Gi
  volumes:
    - name: registry-dockerconfig
      secret:
        secretName: registry-dockerconfig
        items:
          - key: .dockerconfigjson
            path: config.json
  arguments:
    parameters:
      - name: repo-owner
      - name: repo-name
        value: business-repo
      - name: commit-sha
      - name: source-ref
        value: master
      - name: gitops-repo
        value: spark-harness/gitops-repo
      - name: gitops-branch
        value: master
      - name: status-context
        value: spark/business-image-release
      - name: python-image
        value: python:3.13-bookworm
      - name: kubectl-image
        value: bitnami/kubectl:1.31
  templates:
    - name: run
      dag:
        tasks:
          - name: pending
            template: github-status
            arguments:
              parameters:
                - name: state
                  value: pending
                - name: description
                  value: Spark business image release started
          - name: checkout
            dependencies: [pending]
            template: checkout-source
          - name: build-applicant-api
            dependencies: [checkout]
            template: build-image
            arguments:
              parameters:
                - name: image-key
                  value: applicant-api
                - name: image-repository
                  value: ghcr.io/spark-harness/applicant-api
                - name: build-context
                  value: "."
                - name: dockerfile-dir
                  value: apps/applicant-api
                - name: dockerfile-name
                  value: Dockerfile
          - name: build-fides-bff
            dependencies: [checkout]
            template: build-image
            arguments:
              parameters:
                - name: image-key
                  value: fides-bff
                - name: image-repository
                  value: ghcr.io/spark-harness/fides-bff
                - name: build-context
                  value: "."
                - name: dockerfile-dir
                  value: apps/fides-bff
                - name: dockerfile-name
                  value: Dockerfile
          - name: build-fides
            dependencies: [checkout]
            template: build-image
            arguments:
              parameters:
                - name: image-key
                  value: fides
                - name: image-repository
                  value: ghcr.io/spark-harness/fides
                - name: build-context
                  value: "."
                - name: dockerfile-dir
                  value: apps/fides-web
                - name: dockerfile-name
                  value: Dockerfile
          - name: build-quote-api
            dependencies: [checkout]
            template: build-image
            arguments:
              parameters:
                - name: image-key
                  value: quote-api
                - name: image-repository
                  value: ghcr.io/spark-harness/quote-api
                - name: build-context
                  value: "."
                - name: dockerfile-dir
                  value: apps/quote-api
                - name: dockerfile-name
                  value: Dockerfile
          - name: build-origination-api
            dependencies: [checkout]
            template: build-image
            arguments:
              parameters:
                - name: image-key
                  value: origination-api
                - name: image-repository
                  value: ghcr.io/spark-harness/origination-api
                - name: build-context
                  value: "."
                - name: dockerfile-dir
                  value: apps/origination-api
                - name: dockerfile-name
                  value: Dockerfile
          - name: scan-applicant-api
            dependencies: [build-applicant-api]
            template: scan-image
            arguments:
              parameters:
                - name: image-key
                  value: applicant-api
          - name: scan-fides-bff
            dependencies: [build-fides-bff]
            template: scan-image
            arguments:
              parameters:
                - name: image-key
                  value: fides-bff
          - name: scan-fides
            dependencies: [build-fides]
            template: scan-image
            arguments:
              parameters:
                - name: image-key
                  value: fides
          - name: scan-quote-api
            dependencies: [build-quote-api]
            template: scan-image
            arguments:
              parameters:
                - name: image-key
                  value: quote-api
          - name: scan-origination-api
            dependencies: [build-origination-api]
            template: scan-image
            arguments:
              parameters:
                - name: image-key
                  value: origination-api
          - name: update-gitops-digests
            dependencies: [scan-applicant-api, scan-fides-bff, scan-fides, scan-quote-api, scan-origination-api]
            template: update-gitops-digests
          - name: validate-gitops-render
            dependencies: [update-gitops-digests]
            template: validate-gitops-render
          - name: push-gitops-promotion
            dependencies: [validate-gitops-render]
            template: push-gitops-promotion
          - name: success
            dependencies: [push-gitops-promotion]
            template: github-status
            arguments:
              parameters:
                - name: state
                  value: success
                - name: description
                  value: Spark business images released and promoted

    - name: checkout-source
      container:
        image: alpine/git:2.47.2
        env:
          - name: GITHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: github-source-token
                key: token
        command:
          - sh
          - -c
        args:
          - |
            set -eu
            rm -rf /workspace/source
            git clone --depth 1 --branch "{{workflow.parameters.source-ref}}" \
              "https://x-access-token:${GITHUB_TOKEN}@github.com/{{workflow.parameters.repo-owner}}/{{workflow.parameters.repo-name}}.git" \
              /workspace/source
            cd /workspace/source
            git fetch --depth 1 origin "{{workflow.parameters.commit-sha}}"
            git checkout --detach "{{workflow.parameters.commit-sha}}"
        volumeMounts:
          - name: workspace
            mountPath: /workspace

    - name: build-image
      inputs:
        parameters:
          - name: image-key
          - name: image-repository
          - name: build-context
          - name: dockerfile-dir
          - name: dockerfile-name
      container:
        image: moby/buildkit:rootless
        workingDir: /workspace/source
        env:
          - name: BUILDKITD_FLAGS
            value: --oci-worker-no-process-sandbox
          - name: DOCKER_CONFIG
            value: /workspace/docker
          - name: GITHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: github-source-token
                key: token
        command:
          - sh
          - -c
        args:
          - |
            set -eu
            short_sha="$(printf '%s' "{{workflow.parameters.commit-sha}}" | cut -c1-12)"
            image_ref="{{inputs.parameters.image-repository}}:sha-${short_sha}"
            image_dir="/workspace/images/{{inputs.parameters.image-key}}"
            mkdir -p "${image_dir}"
            buildctl-daemonless.sh build \
              --frontend dockerfile.v0 \
              --local context="/workspace/source/{{inputs.parameters.build-context}}" \
              --local dockerfile="/workspace/source/{{inputs.parameters.dockerfile-dir}}" \
              --opt filename="{{inputs.parameters.dockerfile-name}}" \
              --opt "label:org.opencontainers.image.revision={{workflow.parameters.commit-sha}}" \
              --secret id=github_token,env=GITHUB_TOKEN \
              --metadata-file "${image_dir}/metadata.json" \
              --output "type=image,name=${image_ref},push=true"
            digest="$(sed -n 's/.*"containerimage.digest"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' "${image_dir}/metadata.json" | head -n1)"
            test -n "${digest}"
            printf '%s' "${image_ref}" > "${image_dir}/ref"
            printf '%s' "${digest}" > "${image_dir}/digest"
            printf '%s@%s' "{{inputs.parameters.image-repository}}" "${digest}" > "${image_dir}/immutable-ref"
        securityContext:
          privileged: true
          runAsGroup: 1000
          runAsUser: 1000
        volumeMounts:
          - name: workspace
            mountPath: /workspace
          - name: registry-dockerconfig
            mountPath: /workspace/docker
            readOnly: true

    - name: scan-image
      inputs:
        parameters:
          - name: image-key
      container:
        image: aquasec/trivy:0.58.2
        env:
          - name: DOCKER_CONFIG
            value: /workspace/docker
        command:
          - sh
          - -c
        args:
          - |
            set -eu
            image_ref="$(cat /workspace/images/{{inputs.parameters.image-key}}/immutable-ref)"
            trivy image \
              --exit-code 1 \
              --severity HIGH,CRITICAL \
              --ignore-unfixed \
              --format table \
              "${image_ref}"
        volumeMounts:
          - name: workspace
            mountPath: /workspace
          - name: registry-dockerconfig
            mountPath: /workspace/docker
            readOnly: true

    - name: update-gitops-digests
      container:
        image: "{{workflow.parameters.python-image}}"
        env:
          - name: GITHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: github-gitops-token
                key: token
        command:
          - bash
          - -ceu
        args:
          - |
            apt-get update
            apt-get install -y --no-install-recommends git
            python3 -m pip install --no-cache-dir PyYAML==6.0.2
            rm -rf /workspace/gitops
            git clone --depth 1 --branch "{{workflow.parameters.gitops-branch}}" \
              "https://x-access-token:${GITHUB_TOKEN}@github.com/{{workflow.parameters.gitops-repo}}.git" \
              /workspace/gitops
            cd /workspace/gitops
            git remote set-url origin "https://github.com/{{workflow.parameters.gitops-repo}}.git"
            python3 - <<'PY'
            from pathlib import Path
            import yaml

            root = Path("/workspace/gitops")
            releases = [
                {
                    "overlay": "apps/applicant-api/overlays/dev-1/kustomization.yaml",
                    "image": "ghcr.io/spark-harness/applicant-api",
                    "digest": Path("/workspace/images/applicant-api/digest").read_text(encoding="utf-8").strip(),
                },
                {
                    "overlay": "apps/fides-bff/overlays/dev-1/kustomization.yaml",
                    "image": "ghcr.io/spark-harness/fides-bff",
                    "digest": Path("/workspace/images/fides-bff/digest").read_text(encoding="utf-8").strip(),
                },
                {
                    "overlay": "apps/fides/overlays/dev-1/kustomization.yaml",
                    "image": "ghcr.io/spark-harness/fides",
                    "digest": Path("/workspace/images/fides/digest").read_text(encoding="utf-8").strip(),
                },
                {
                    "overlay": "apps/quote-api/overlays/dev-1/kustomization.yaml",
                    "image": "ghcr.io/spark-harness/quote-api",
                    "digest": Path("/workspace/images/quote-api/digest").read_text(encoding="utf-8").strip(),
                },
                {
                    "overlay": "apps/origination-api/overlays/dev-1/kustomization.yaml",
                    "image": "ghcr.io/spark-harness/origination-api",
                    "digest": Path("/workspace/images/origination-api/digest").read_text(encoding="utf-8").strip(),
                },
            ]

            for release in releases:
                file = root / release["overlay"]
                data = yaml.safe_load(file.read_text(encoding="utf-8"))
                images = data.setdefault("images", [])
                for image in images:
                    if image.get("name") == release["image"]:
                        image["digest"] = release["digest"]
                        image.pop("newTag", None)
                        break
                else:
                    images.append({"name": release["image"], "digest": release["digest"]})
                file.write_text(yaml.safe_dump(data, sort_keys=False), encoding="utf-8")
            PY
        volumeMounts:
          - name: workspace
            mountPath: /workspace

    - name: validate-gitops-render
      container:
        image: "{{workflow.parameters.kubectl-image}}"
        command:
          - sh
          - -ceu
        args:
          - |
            kubectl kustomize /workspace/gitops/apps/applicant-api/overlays/dev-1 >/tmp/applicant-api.yaml
            kubectl kustomize /workspace/gitops/apps/fides-bff/overlays/dev-1 >/tmp/fides-bff.yaml
            kubectl kustomize /workspace/gitops/apps/fides/overlays/dev-1 >/tmp/fides.yaml
            kubectl kustomize /workspace/gitops/apps/quote-api/overlays/dev-1 >/tmp/quote-api.yaml
            kubectl kustomize /workspace/gitops/apps/origination-api/overlays/dev-1 >/tmp/origination-api.yaml
            kubectl kustomize /workspace/gitops/clusters/lendora-dev-1 >/tmp/lendora-dev-1.yaml
        volumeMounts:
          - name: workspace
            mountPath: /workspace

    - name: push-gitops-promotion
      container:
        image: alpine/git:2.47.2
        env:
          - name: GITHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: github-gitops-token
                key: token
        command:
          - sh
          - -ceu
        args:
          - |
            cd /workspace/gitops
            git config user.name "spark-argo"
            git config user.email "spark-argo@users.noreply.github.com"
            git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/{{workflow.parameters.gitops-repo}}.git"
            git add \
              apps/applicant-api/overlays/dev-1/kustomization.yaml \
              apps/fides-bff/overlays/dev-1/kustomization.yaml \
              apps/fides/overlays/dev-1/kustomization.yaml \
              apps/quote-api/overlays/dev-1/kustomization.yaml \
              apps/origination-api/overlays/dev-1/kustomization.yaml
            git diff --staged --quiet && exit 0
            git commit -m "chore(gitops): promote business images {{workflow.parameters.commit-sha}}"
            git push origin HEAD:"{{workflow.parameters.gitops-branch}}"
        volumeMounts:
          - name: workspace
            mountPath: /workspace

    - name: github-status
      inputs:
        parameters:
          - name: state
          - name: description
      container:
        image: curlimages/curl:8.10.1
        env:
          - name: GITHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: github-status-token
                key: token
        command:
          - sh
          - -c
        args:
          - |
            curl -fsS -X POST \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/{{workflow.parameters.repo-owner}}/{{workflow.parameters.repo-name}}/statuses/{{workflow.parameters.commit-sha}}" \
              -d "{\"state\":\"{{inputs.parameters.state}}\",\"context\":\"{{workflow.parameters.status-context}}\",\"description\":\"{{inputs.parameters.description}}\"}"

    - name: report-failure
      steps:
        - - name: failure
            template: github-status
            when: "{{workflow.status}} != Succeeded"
            arguments:
              parameters:
                - name: state
                  value: failure
                - name: description
                  value: Spark business image release failed
