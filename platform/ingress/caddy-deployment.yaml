apiVersion: apps/v1
kind: Deployment
metadata:
  name: caddy
  namespace: caddy
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: caddy
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: caddy
    spec:
      containers:
      - image: caddy:2.10.2
        imagePullPolicy: IfNotPresent
        name: caddy
        ports:
        - containerPort: 80
          hostPort: 80
          name: http
          protocol: TCP
        - containerPort: 443
          hostPort: 443
          name: https
          protocol: TCP
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /etc/caddy/Caddyfile
          name: config
          subPath: Caddyfile
        - mountPath: /data
          name: data
        - mountPath: /config
          name: caddy-config-dir
      dnsPolicy: ClusterFirstWithHostNet
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
      - configMap:
          defaultMode: 420
          name: caddy-config
        name: config
      - name: data
        persistentVolumeClaim:
          claimName: caddy-data
      - emptyDir: {}
        name: caddy-config-dir
